name: Build Windows Mini PRO

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install
      - name: start
        run: npm start
      - name: Build installer
        run: npm run build

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: mileboard-mini-pro
          path: dist/Mile Board Mini PRO Setup.exe
